<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data: asset: https://asset.localhost; media-src 'self' data: asset: https://asset.localhost; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; style-src-elem 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; font-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net; connect-src 'self' http://ipc.localhost https://ipc.localhost" />
  <title>Pomodoro Overlay</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
  <div id="app" class="phase-work">
    <div class="button-wrapper">
      <div class="top-bar hoverable">
        <div class="phase-tabs">
          <button class="tab-btn active" data-phase="work">Focus</button>
          <button class="tab-btn" data-phase="short">Break</button>
          <button class="tab-btn" data-phase="long">Big Break</button>
        </div>
      </div>


      <div class="bottom-bar hoverable">
        <span></span>
        <span></span>
        <button id="play" class="start-btn">START</button>
        <button id="skip" class="start-btn hidden" title="Skip">
          <i class="ph-fill ph-skip-forward"></i>
        </button>
        <button id="snooze" class="start-btn hidden">SNOOZE</button>
      </div>
    </div>
    <div class="timer">25:00</div>
  </div>

  <div class="resize-handle resize-nw" data-dir="NorthWest"></div>
  <div class="resize-handle resize-ne" data-dir="NorthEast"></div>
  <div class="resize-handle resize-sw" data-dir="SouthWest"></div>
  <div class="resize-handle resize-se" data-dir="SouthEast"></div>

  <script type="module" src="app.js"></script>
</body>

</html>
