<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data: asset: https://asset.localhost; media-src 'self' data: asset: https://asset.localhost; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com" />
  <title>Pomodoro Overlay</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
  <div id="app" class="phase-work">
    <div class="top-bar hoverable">
      <div class="phase-tabs">
        <button class="tab-btn active" data-phase="work">Focus</button>
        <button class="tab-btn" data-phase="short">Break</button>
        <button class="tab-btn" data-phase="long">Big Break</button>
      </div>
    </div>

    <div class="timer">25:00</div>

    <div class="bottom-bar">
      <button id="play" class="start-btn">START #1</button>
      <button id="skip" class="start-btn skip-btn" title="Skip">
        <i class="ph ph-skip-forward"></i>
      </button>
    </div>
  </div>

  <div class="resize-handle resize-nw" data-dir="NorthWest"></div>
  <div class="resize-handle resize-ne" data-dir="NorthEast"></div>
  <div class="resize-handle resize-sw" data-dir="SouthWest"></div>
  <div class="resize-handle resize-se" data-dir="SouthEast"></div>

  <script src="app.js"></script>
</body>

</html>
